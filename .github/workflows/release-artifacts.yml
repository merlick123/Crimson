name: release-artifacts

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: crimson-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact_name: crimson-win-x64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: crimson-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Publish self-contained build
        run: dotnet publish src/Crimson.Cli/Crimson.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o artifacts/${{ matrix.artifact_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.artifact_name }}/**
